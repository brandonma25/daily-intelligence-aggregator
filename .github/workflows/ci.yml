name: PR Gate

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: pr-lint
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  unit-tests:
    name: pr-unit-tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit and integration tests
        run: npm run test

  build:
    name: pr-build
    runs-on: ubuntu-latest
    needs: lint
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-publishable-key
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      OPENAI_API_KEY: test-openai-key
      THE_NEWS_API_KEY: test-news-api-key
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  e2e-chromium:
    name: pr-e2e-chromium
    runs-on: ubuntu-latest
    needs: build
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-publishable-key
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      OPENAI_API_KEY: test-openai-key
      THE_NEWS_API_KEY: test-news-api-key
      NEXT_TELEMETRY_DISABLED: 1
      PLAYWRIGHT_MANAGED_WEBSERVER: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Chromium release smoke
        run: npm run test:e2e:chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

  pr-summary:
    name: pr-summary
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit-tests
      - build
      - e2e-chromium
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate PR summary
        env:
          PR_BASE_REF: ${{ github.base_ref }}
          PR_HEAD_REF: ${{ github.head_ref }}
        run: |
          npm run release:pr-summary >> "$GITHUB_STEP_SUMMARY"
          {
            echo ""
            echo "### Required remaining gates"
            echo "- Preview gate: still required outside this workflow"
            echo "- Human auth/session gate: still required outside this workflow"
            echo "- Final merge approval: still required by branch protection"
          } >> "$GITHUB_STEP_SUMMARY"
