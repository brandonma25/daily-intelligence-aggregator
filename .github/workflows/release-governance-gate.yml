name: release-governance-gate

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

jobs:
  release-governance-gate:
    name: release-governance-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve governance diff range
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            PR_TITLE="${{ github.event.pull_request.title }}"
            BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "merge_group" ]]; then
            BASE_SHA="${{ github.event.merge_group.base_sha }}"
            HEAD_SHA="${{ github.sha }}"
            PR_TITLE=""
            BRANCH_NAME="${{ github.ref_name }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            PR_TITLE=""
            BRANCH_NAME="${{ github.ref_name }}"
          fi

          {
            echo "BASE_SHA=$BASE_SHA"
            echo "HEAD_SHA=$HEAD_SHA"
            echo "PR_TITLE<<EOF"
            echo "$PR_TITLE"
            echo "EOF"
            echo "BRANCH_NAME=$BRANCH_NAME"
          } >> "$GITHUB_ENV"

      - name: Emit governance audit summary
        shell: bash
        run: |
          set -euo pipefail
          python scripts/pr-governance-audit.py \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --pr-title "$PR_TITLE" \
            --branch-name "$BRANCH_NAME" >> "$GITHUB_STEP_SUMMARY"

      - name: Run release governance gate
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release-governance-gate.py \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --pr-title "$PR_TITLE" \
            --branch-name "$BRANCH_NAME"
