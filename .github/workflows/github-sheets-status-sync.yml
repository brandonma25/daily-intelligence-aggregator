name: GitHub Sheets Status Sync

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: read
  pull-requests: read

jobs:
  sync-merged-pr:
    name: sync-merged-pr
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.event.pull_request.base.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate required Google Sheets secrets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing required secret: GOOGLE_SERVICE_ACCOUNT_JSON" >&2
            exit 1
          fi
          if [ -z "$GOOGLE_SHEET_ID" ]; then
            echo "Missing required secret: GOOGLE_SHEET_ID" >&2
            exit 1
          fi

      - name: Write PR payload
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
        run: |
          node -e "const fs=require('node:fs'); fs.writeFileSync(process.env.RUNNER_TEMP + '/github-sheets-pr.json', JSON.stringify({title: process.env.PR_TITLE, branchName: process.env.PR_BRANCH, url: process.env.PR_URL, mergedAt: process.env.PR_MERGED_AT}, null, 2));"

      - name: Sync Google Sheets status
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: node scripts/github-sheets-sync.mjs --event pr-merge --payload-file "$RUNNER_TEMP/github-sheets-pr.json"
